// ── SUPABASE CONFIG ──────────────────────────────────────────
const SUPA_URL = 'https://garogvbyrdqheutdianh.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdhcm9ndmJ5cmRxaGV1dGRpYW5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMzU3NDIsImV4cCI6MjA5NzkxMTc0Mn0.2QGUzEO-rR9q7b_n6W5FiK-J1nzYcDBu2dIuJbEGtTI';
const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);

// ── API HELPERS ──────────────────────────────────────────────
const DB = {
  async getAll(table) {
    const { data, error } = await supabase.from(table).select('*').order('created_at', { ascending: false });
    if (error) { console.error('DB get error:', table, error); return []; }
    return data || [];
  },
  async upsert(table, item) {
    // Convert camelCase keys to snake_case for Supabase
    const mapped = mapToDb(table, item);
    const { data, error } = await supabase.from(table).upsert(mapped, { onConflict: 'id' }).select();
    if (error) { console.error('DB upsert error:', table, error); return null; }
    return data;
  },
  async remove(table, id) {
    const { error } = await supabase.from(table).delete().eq('id', id);
    if (error) { console.error('DB delete error:', table, error); return false; }
    return true;
  }
};

// Map JS camelCase to DB snake_case
function mapToDb(table, item) {
  const base = {...item};
  if (base.fechaAlta) { base.fecha_alta = base.fechaAlta; delete base.fechaAlta; }
  if (base.fechaVencimiento) { base.fecha_vencimiento = base.fechaVencimiento; delete base.fechaVencimiento; }
  if (base.fechaContacto) { base.fecha_contacto = base.fechaContacto; delete base.fechaContacto; }
  if (base.proximoSeguimiento) { base.proximo_seguimiento = base.proximoSeguimiento; delete base.proximoSeguimiento; }
  if (base.fechaIngreso) { base.fecha_ingreso = base.fechaIngreso; delete base.fechaIngreso; }
  if (base.comerciosReferidos !== undefined) { base.comercios_referidos = base.comerciosReferidos; delete base.comerciosReferidos; }
  if (base.profesionalesReferidos !== undefined) { base.profesionales_referidos = base.profesionalesReferidos; delete base.profesionalesReferidos; }
  if (base.ridersReferidos !== undefined) { base.riders_referidos = base.ridersReferidos; delete base.ridersReferidos; }
  // Remove React-internal or undefined fields
  delete base._tipo; delete base._nom; delete base._sub; delete base._phone; delete base._email;
  delete base._d; delete base._t; delete base.created_at;
  return base;
}

// Map DB snake_case back to JS camelCase
function mapFromDb(table, item) {
  const base = {...item};
  if (base.fecha_alta) { base.fechaAlta = base.fecha_alta; }
  if (base.fecha_vencimiento) { base.fechaVencimiento = base.fecha_vencimiento; }
  if (base.fecha_contacto) { base.fechaContacto = base.fecha_contacto; }
  if (base.proximo_seguimiento) { base.proximoSeguimiento = base.proximo_seguimiento; }
  if (base.fecha_ingreso) { base.fechaIngreso = base.fecha_ingreso; }
  if (base.comercios_referidos !== undefined) { base.comerciosReferidos = base.comercios_referidos; }
  if (base.profesionales_referidos !== undefined) { base.profesionalesReferidos = base.profesionales_referidos; }
  if (base.riders_referidos !== undefined) { base.ridersReferidos = base.riders_referidos; }
  if (!base.historial) base.historial = [];
  return base;
}

window._DB = DB;
window._mapFromDb = mapFromDb;
console.log('✅ Supabase conectado:', SUPA_URL);

function BarChartSVG({data,color,horizontal,height=180}){
  if(!data||!data.length)return null;
  const max=Math.max(...data.map(d=>d.value),1);
  if(horizontal){
    const rowH=28;const h=data.length*rowH+20;const labelW=110;const barW=200;
    return E('svg',{width:'100%',height:h,viewBox:'0 0 '+(labelW+barW+50)+' '+h},
      data.map((d,i)=>{
        const bw=Math.max((d.value/max)*barW,2);const y=i*rowH+10;
        return E('g',{key:i},
          E('text',{x:labelW-5,y:y+14,textAnchor:'end',className:'svg-bar-label'},d.name.length>14?d.name.substring(0,13)+'…':d.name),
          E('rect',{x:labelW,y:y+2,width:bw,height:18,rx:3,fill:color||G,opacity:.85}),
          E('text',{x:labelW+bw+4,y:y+14,className:'svg-bar-val'},d.value)
        );
      })
    );
  }
  const w=480;const barW=Math.max(20,Math.floor((w-40)/data.length)-6);
  return E('svg',{width:'100%',height,viewBox:'0 0 '+w+' '+height},
    data.map((d,i)=>{
      const bh=Math.max((d.value/max)*(height-40),2);const x=20+i*(barW+6);const y=height-30-bh;
      return E('g',{key:i},
        E('rect',{x,y,width:barW,height:bh,rx:3,fill:color||G,opacity:.85}),
        E('text',{x:x+barW/2,y:height-14,textAnchor:'middle',className:'svg-bar-label'},d.name.length>6?d.name.substring(0,5)+'…':d.name),
        E('text',{x:x+barW/2,y:y-3,textAnchor:'middle',className:'svg-bar-val'},d.value)
      );
    })
  );
}
function PieChartSVG({data,size=160}){
  if(!data||!data.length)return null;
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  const cx=size/2,cy=size/2,radius=size/2-10;
  let angle=-Math.PI/2;
  const slices=data.map((d,i)=>{
    const sweep=(d.value/total)*2*Math.PI;
    const x1=cx+radius*Math.cos(angle),y1=cy+radius*Math.sin(angle);
    angle+=sweep;
    const x2=cx+radius*Math.cos(angle),y2=cy+radius*Math.sin(angle);
    const large=sweep>Math.PI?1:0;
    const mx=cx+radius*0.65*Math.cos(angle-sweep/2),my=cy+radius*0.65*Math.sin(angle-sweep/2);
    return{path:`M${cx},${cy} L${x1},${y1} A${radius},${radius} 0 ${large},1 ${x2},${y2} Z`,color:COLORS[i%COLORS.length],label:d.name,value:d.value,mx,my,pct:Math.round(d.value/total*100)};
  });
  return E('div',{style:{display:'flex',alignItems:'center',gap:16}},
    E('svg',{width:size,height:size,viewBox:'0 0 '+size+' '+size},
      slices.map((s,i)=>E('path',{key:i,d:s.path,fill:s.color,stroke:'#fff',strokeWidth:2}))
    ),
    E('div',{style:{flex:1}},
      slices.slice(0,6).map((s,i)=>E('div',{key:i,style:{display:'flex',alignItems:'center',gap:6,marginBottom:4}},
        E('div',{style:{width:10,height:10,borderRadius:2,background:s.color,flexShrink:0}}),
        E('span',{style:{fontSize:11,color:'#374151',flex:1}},s.label),
        E('span',{style:{fontSize:11,fontWeight:700,color:'#111827'}},s.value)
      ))
    )
  );
}
function LineChartSVG({data,color,height=140}){
  if(!data||!data.length)return null;
  const max=Math.max(...data.map(d=>d.value),1);
  const w=460;const pts=data.map((d,i)=>({x:30+i*(w-40)/(data.length-1||1),y:height-30-(d.value/max)*(height-50)}));
  const path=pts.map((p,i)=>i===0?'M'+p.x+','+p.y:'L'+p.x+','+p.y).join(' ');
  const area=path+' L'+pts[pts.length-1].x+','+(height-30)+' L'+pts[0].x+','+(height-30)+' Z';
  return E('svg',{width:'100%',height,viewBox:'0 0 '+w+' '+height},
    E('defs',null,E('linearGradient',{id:'lg',x1:'0',y1:'0',x2:'0',y2:'1'},E('stop',{offset:'0%',stopColor:color||G,stopOpacity:.3}),E('stop',{offset:'100%',stopColor:color||G,stopOpacity:0}))),
    E('path',{d:area,fill:'url(#lg)'}),
    E('path',{d:path,fill:'none',stroke:color||G,strokeWidth:2.5,strokeLinejoin:'round'}),
    pts.map((p,i)=>E('g',{key:i},
      E('circle',{cx:p.x,cy:p.y,r:4,fill:'#fff',stroke:color||G,strokeWidth:2}),
      E('text',{x:p.x,y:height-5,textAnchor:'middle',className:'svg-bar-label'},data[i].name),
      E('text',{x:p.x,y:p.y-8,textAnchor:'middle',className:'svg-bar-val'},data[i].value)
    ))
  );
}

function TableMod({data,columns,onAdd,addLabel,exportName,filterFields}){
  const [q,setQ]=useState('');const [flt,setFlt]=useState({});const [page,setPage]=useState(1);
  const PER=15;
  const filtered=data.filter(row=>{
    if(q){const ql=q.toLowerCase();if(!Object.values(row).some(v=>v&&String(v).toLowerCase().includes(ql)))return false;}
    for(const[k,v]of Object.entries(flt)){if(v&&row[k]!==v)return false;}
    return true;
  });
  const pages=Math.ceil(filtered.length/PER);
  const paged=filtered.slice((page-1)*PER,page*PER);
  return E('div',null,
    E('div',{className:'flt'},
      E('input',{className:'si2',placeholder:'Buscar...',value:q,onChange:ev=>{setQ(ev.target.value);setPage(1);}}),
      filterFields&&filterFields.map(f=>E('select',{key:f.key,className:'fs',value:flt[f.key]||'',onChange:ev=>{setFlt({...flt,[f.key]:ev.target.value});setPage(1);}},
        E('option',{value:''},f.label),...(f.options||[]).map(o=>E('option',{key:o,value:o},o))
      )),
      E('div',{style:{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}},
        E('span',{style:{fontSize:12,color:'#6b7280'}},filtered.length+' registros'),
        E(ExportBtns,{data:filtered,name:exportName}),
        onAdd&&E('button',{className:'btn bp',onClick:onAdd},E(Ico,{name:'plus',size:14}),addLabel||'Agregar')
      )
    ),
    E('div',{className:'tw'},
      E('table',null,
        E('thead',null,E('tr',null,...columns.map(c=>E('th',{key:c.label},c.label)))),
        E('tbody',null,
          paged.length===0?E('tr',null,E('td',{colSpan:columns.length},E('div',{className:'em'},E('div',{className:'emi'},'🔍'),E('div',{className:'emt'},'Sin resultados'),E('div',null,'Intentá otros filtros')))):
          paged.map((row,i)=>E('tr',{key:row.id||i},...columns.map(c=>E('td',{key:c.label},c.render?c.render(row):row[c.key]||'-'))))
        )
      )
    ),
    pages>1&&E('div',{style:{display:'flex',justifyContent:'center',gap:8,marginTop:16,alignItems:'center'}},
      E('button',{className:'btn bs bsm',disabled:page===1,onClick:()=>setPage(p=>p-1)},'← Anterior'),
      E('span',{style:{fontSize:12,color:'#6b7280'}},page+' / '+pages),
      E('button',{className:'btn bs bsm',disabled:page===pages,onClick:()=>setPage(p=>p+1)},'Siguiente →')
    )
  );
}

  function saveSistema(){const d={...loadLS(),...perfil,...sistema,planes};localStorage.setItem(LS_KEY,JSON.stringify(d));showToast('✅ Configuración guardada');}
  function savePlanes(){const d={...loadLS(),...perfil,...sistema,planes};localStorage.setItem(LS_KEY,JSON.stringify(d));showToast('✅ Planes guardados');}
  function handleFoto(ev){const file=ev.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>setPerfil(p=>({...p,foto:e.target.result}));reader.readAsDataURL(file);}
  const tabs=[{id:'perfil',label:'👤 Perfil'},{id:'sistema',label:'⚙️ Sistema'},{id:'planes',label:'💳 Planes'},{id:'acerca',label:'ℹ️ Acerca de'}];
  return E('div',null,
    toast&&E('div',{style:{position:'fixed',top:20,right:20,background:'#111827',color:'#fff',padding:'12px 20px',borderRadius:10,fontSize:13,fontWeight:600,zIndex:9999,boxShadow:'0 4px 20px rgba(0,0,0,.3)'}},toast),
    E('div',{className:'tabs'},tabs.map(t=>E('div',{key:t.id,className:'tab'+(tab===t.id?' on':''),onClick:()=>setTab(t.id)},t.label))),

    // ── PERFIL ──
    tab==='perfil'&&E('div',{className:'card'},
      E('div',{className:'ch'},E('div',{className:'ct'},'Perfil de Usuario')),
      E('div',{className:'cb'},
        E('div',{style:{display:'flex',gap:24,alignItems:'center',marginBottom:24,flexWrap:'wrap'}},
          E('div',{style:{position:'relative'}},
            perfil.foto
              ? E('img',{src:perfil.foto,style:{width:80,height:80,borderRadius:'50%',objectFit:'cover',border:'3px solid '+G}})
              : E('div',{className:'pav',style:{width:80,height:80,fontSize:30}},user.ini),
            E('label',{style:{position:'absolute',bottom:0,right:0,width:26,height:26,background:G,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',border:'2px solid #fff'}},
              E('svg',{viewBox:'0 0 24 24',fill:'none',stroke:'#fff',strokeWidth:2.5,width:13,height:13},E('path',{d:'M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z'})),
              E('input',{type:'file',accept:'image/*',style:{display:'none'},onChange:handleFoto})
            )
          ),
          E('div',null,
            E('div',{style:{fontSize:18,fontWeight:800}},perfil.nombre||user.name),
            E('div',{style:{color:'#6b7280',fontSize:13}},user.role+' · '+(perfil.empresa||'Alma Orders')),
            E('div',{style:{fontSize:11,color:'#9ca3af',marginTop:4}},'Clic en el lápiz para cambiar foto')
          )
        ),
        E('div',{className:'fg'},
          [{key:'nombre',label:'Nombre completo'},{key:'email',label:'Email'},{key:'telefono',label:'Teléfono'},{key:'empresa',label:'Empresa / Organización'}].map(f=>
            E('div',{key:f.key,className:'ff'},
              E('label',{className:'fl'},f.label),
              E('input',{className:'fi',value:perfil[f.key]||'',onChange:ev=>setPerfil({...perfil,[f.key]:ev.target.value})})
            )
          )
        ),
        E('div',{style:{marginTop:20}},E('button',{className:'btn bp',onClick:savePerfil},'Guardar Perfil'))
      )
    ),

    // ── SISTEMA ──
    tab==='sistema'&&E('div',{className:'card'},
      E('div',{className:'ch'},E('div',{className:'ct'},'Configuración del Sistema')),
      E('div',{className:'cb'},
        E('div',{className:'fg'},
          E('div',{className:'ff'},E('label',{className:'fl'},'Zona horaria'),E('select',{className:'fsel',value:sistema.timezone,onChange:ev=>setSistema({...sistema,timezone:ev.target.value})},['America/Argentina/Buenos_Aires','America/Santiago','America/Lima','America/Bogota','America/Mexico_City','America/New_York','Europe/Madrid'].map(z=>E('option',{key:z,value:z},z)))),
          E('div',{className:'ff'},E('label',{className:'fl'},'Moneda'),E('select',{className:'fsel',value:sistema.moneda,onChange:ev=>setSistema({...sistema,moneda:ev.target.value})},['ARS - Peso Argentino','USD - Dólar','EUR - Euro','CLP - Peso Chileno','COP - Peso Colombiano'].map(m=>E('option',{key:m,value:m},m)))),
          E('div',{className:'ff'},E('label',{className:'fl'},'Formato de fecha'),E('select',{className:'fsel',value:sistema.fecha,onChange:ev=>setSistema({...sistema,fecha:ev.target.value})},['DD/MM/AAAA','MM/DD/AAAA','AAAA-MM-DD'].map(f=>E('option',{key:f,value:f},f)))),
          E('div',{className:'ff'},E('label',{className:'fl'},'Idioma'),E('select',{className:'fsel',value:sistema.idioma,onChange:ev=>setSistema({...sistema,idioma:ev.target.value})},['Español (AR)','Español (ES)','Español (MX)','English'].map(i=>E('option',{key:i,value:i},i))))
        ),
        E('div',{style:{marginTop:20,display:'flex',gap:20}},
          E('label',{style:{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}},
            E('input',{type:'checkbox',checked:sistema.notificaciones,onChange:ev=>setSistema({...sistema,notificaciones:ev.target.checked}),style:{width:16,height:16,accentColor:G}}),
            E('span',{style:{fontSize:13,fontWeight:500}},'Notificaciones activas')
          ),
          E('label',{style:{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}},
            E('input',{type:'checkbox',checked:sistema.recordatorios,onChange:ev=>setSistema({...sistema,recordatorios:ev.target.checked}),style:{width:16,height:16,accentColor:G}}),
            E('span',{style:{fontSize:13,fontWeight:500}},'Recordatorios automáticos')
          )
        ),
        E('div',{style:{marginTop:20}},E('button',{className:'btn bp',onClick:saveSistema},'Guardar Configuración'))
      )
    ),

    // ── PLANES ──
    tab==='planes'&&E('div',null,
      E('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:16,marginBottom:20}},
        planes.map((p,i)=>E('div',{key:i,className:'card',style:{borderTop:'3px solid '+COLORS[i],padding:20}},
          E('div',{style:{marginBottom:10}},
            E('label',{className:'fl'},'Nombre'),
            E('input',{className:'fi',style:{width:'100%',marginTop:4},value:p.nombre,onChange:ev=>{const n=[...planes];n[i]={...n[i],nombre:ev.target.value};setPlanes(n);}})
          ),
          E('div',{style:{marginBottom:10}},
            E('label',{className:'fl'},'Descripción'),
            E('input',{className:'fi',style:{width:'100%',marginTop:4},value:p.desc,onChange:ev=>{const n=[...planes];n[i]={...n[i],desc:ev.target.value};setPlanes(n);}})
          ),
          E('div',null,
            E('label',{className:'fl'},'Precio / mes'),
            E('input',{className:'fi',style:{width:'100%',marginTop:4,fontSize:18,fontWeight:800,color:COLORS[i]},value:p.precio,onChange:ev=>{const n=[...planes];n[i]={...n[i],precio:ev.target.value};setPlanes(n);}})
          )
        ))
      ),
      E('button',{className:'btn bp',onClick:savePlanes},'Guardar Planes')
    ),

    // ── ACERCA DE ──
    tab==='acerca'&&E('div',{className:'card'},E('div',{className:'cb'},
      E('div',{style:{textAlign:'center',padding:'24px 0'}},
        E('div',{style:{width:64,height:64,background:G,borderRadius:14,display:'inline-flex',alignItems:'center',justifyContent:'center',marginBottom:14}},E('svg',{viewBox:'0 0 24 24',fill:'white',width:36,height:36},E('path',{d:'M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'}))),
        E('div',{style:{fontSize:22,fontWeight:900,marginBottom:4}},'CRM Alma Orders'),
        E('div',{style:{fontSize:13,color:'#6b7280',marginBottom:20}},'Sistema de Gestión Comercial v2.0'),
        E('div',{style:{display:'inline-grid',gridTemplateColumns:'1fr 1fr',gap:10,textAlign:'left'}},
          [['Versión','2.0.0'],['Módulos','14 activos'],['Tecnología','React 18 + Supabase'],['Soporte','soporte@almaorders.com']].map(([k,v])=>
            E('div',{key:k,style:{padding:'6px 0',borderBottom:'1px solid #f3f4f6'}},
              E('div',{style:{fontSize:10,color:'#9ca3af'}},k),
              E('div',{style:{fontSize:13,fontWeight:600}},v)
            )
          )
        )
      )
    ))
  );
}

// ── NAV CONFIG ────────────────────────────────────────────────
const NAV=[
  {id:'dashboard',label:'Dashboard',ic:'dashboard',sec:'Principal'},
  {id:'prospectos',label:'Prospectos',ic:'star',sec:'Comercial'},
  {id:'seguimientos',label:'Seguimientos',ic:'calendar',sec:'Comercial'},
  {id:'renovaciones',label:'Renovaciones',ic:'refresh',sec:'Comercial'},
  {id:'profesionales',label:'Profesionales',ic:'users',sec:'Modulos'},
  {id:'tiendas',label:'Tiendas',ic:'store',sec:'Modulos'},
  {id:'comercios',label:'Comercios',ic:'building',sec:'Modulos'},
  {id:'riders',label:'Riders',ic:'moto',sec:'Modulos'},
  {id:'embajadores',label:'Embajadores',ic:'star',sec:'Modulos'},
  {id:'estadisticas',label:'Estadisticas',ic:'chart',sec:'Analisis'},
  {id:'notificaciones',label:'Notificaciones',ic:'bell',sec:'Analisis'},
  {id:'buscador',label:'Buscador Global',ic:'search',sec:'Analisis'},
  {id:'actividad',label:'Actividad',ic:'calendar',sec:'Analisis'},
  {id:'configuracion',label:'Configuracion',ic:'edit',sec:'Sistema'},
];

// ── MAIN APP ──────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [lf,setLf]=useState({u:'',p:'',role:'Administrador'});
  const [page,setPage]=useState('dashboard');
  const [data,setData]=useState(INIT);
  const [sbOpen,setSbOpen]=useState(false);
  const [npOpen,setNpOpen]=useState(false);
  const [dbStatus,setDbStatus]=useState('idle'); // idle | loading | ok | error
  const npRef=useRef();

  // Close notification panel on outside click
  useEffect(()=>{
    const h=ev=>{if(npRef.current&&!npRef.current.contains(ev.target))setNpOpen(false);};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[]);

  // Load data from Supabase after login
  useEffect(()=>{
    if(!user||dbStatus!=='idle')return;
    // Check Supabase is available
    if(!window._DB){setDbStatus('error');return;}
    setDbStatus('loading');
    async function loadAll(){
      try{
        const [prof,tiend,com,rid,emb,psp]=await Promise.all([
          window._DB.getAll('profesionales'),
          window._DB.getAll('tiendas'),
          window._DB.getAll('comercios'),
          window._DB.getAll('riders'),
          window._DB.getAll('embajadores'),
          window._DB.getAll('prospectos'),
        ]);
        const mp=arr=>arr.map(i=>window._mapFromDb('',i));
        setData({
          profesionales:mp(prof),
          tiendas:mp(tiend),
          comercios:mp(com),
          riders:mp(rid),
          embajadores:mp(emb),
          prospectos:mp(psp),
        });
        setDbStatus('ok');
      }catch(e){
        console.error('Supabase load error:',e);
        setDbStatus('error'); // fallback to demo data, NO white screen
      }
    }
    loadAll();
  },[user,dbStatus]);

  function login(){
    if(!lf.u||!lf.p){alert('Completá usuario y contraseña');return;}
    setUser({name:lf.u,role:lf.role,ini:lf.u.substring(0,2).toUpperCase()});
  }

  function handleSave(item,key){
    setData(d=>{
      const arr=d[key];const idx=arr.findIndex(r=>r.id===item.id);
      if(idx>=0){const n=[...arr];n[idx]=item;return{...d,[key]:n};}
      return{...d,[key]:[...arr,item]};
    });
    if(window._DB){window._DB.upsert(key,item).catch(e=>console.error('Save error:',e));}
  }

  function handleDelete(id,key){
    if(!confirm('¿Eliminar este registro?'))return;
    setData(d=>({...d,[key]:d[key].filter(r=>r.id!==id)}));
    if(window._DB){window._DB.remove(key,id).catch(e=>console.error('Delete error:',e));}
  }

  // ── LOGIN SCREEN ──
  if(!user) return E('div',{className:'lp'},
    E('div',{className:'lc'},
      E('div',{className:'ll'},
        E('div',{className:'lli'},E('svg',{viewBox:'0 0 24 24'},E('path',{d:'M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'}))),
        E('div',null,E('div',{className:'lt'},'CRM Alma Orders'),E('div',{className:'ls'},'Sistema de Gestión Comercial'))
      ),
      E('div',{className:'lf'},
        E('div',{className:'fd'},E('label',null,'Usuario'),E('input',{type:'text',placeholder:'Tu usuario',value:lf.u,onChange:ev=>setLf({...lf,u:ev.target.value})})),
        E('div',{className:'fd'},E('label',null,'Contraseña'),E('input',{type:'password',placeholder:'••••••••',value:lf.p,onChange:ev=>setLf({...lf,p:ev.target.value}),onKeyDown:ev=>ev.key==='Enter'&&login()})),
        E('button',{className:'lb',onClick:login},'Ingresar al Sistema'),
        E('div',{style:{marginTop:16}},
          E('div',{style:{fontSize:12,color:'#9ca3af',marginBottom:8}},'Ingresar como:'),
          E('div',{className:'lr'},['Administrador','Vendedor','Soporte'].map(ro=>E('div',{key:ro,className:'rc'+(lf.role===ro?' on':''),onClick:()=>setLf({...lf,role:ro})},ro)))
        ),
        E('div',{className:'lh'},'Demo: cualquier usuario y contraseña')
      )
    )
  );

  const sections=[...new Set(NAV.map(n=>n.sec))];
  const totalN=data.prospectos.filter(p=>p.estado==='Nuevo').length+data.profesionales.filter(p=>{const d=diffD(now,p.fechaVencimiento);return d>=0&&d<=30;}).length;

  function renderPage(){
    switch(page){
      case 'dashboard':return E(Dashboard,{data});
      case 'profesionales':return E(ProfModule,{data:data.profesionales,onSave:handleSave,onDelete:handleDelete});
      case 'prospectos':return E(PSPModule,{data:data.prospectos,onSave:handleSave,onDelete:handleDelete});
      case 'seguimientos':return E(SegModule,{prospectos:data.prospectos});
      case 'renovaciones':return E(RenovModule,{profesionales:data.profesionales,tiendas:data.tiendas,comercios:data.comercios});
      case 'estadisticas':return E(StatModule,{data});
      case 'notificaciones':return E(NotifModule,{data});
      case 'tiendas':return E(GenMod,{dataKey:'tiendas',data:data.tiendas,onSave:handleSave,onDelete:handleDelete,exportName:'tiendas',addLabel:'Nueva Tienda',filterFields:[{key:'estado',label:'Estado',options:ESTADOS},{key:'ciudad',label:'Ciudad',options:CITIES},{key:'plan',label:'Plan',options:PLANS}],fields:[{key:'nombre',label:'Nombre Negocio'},{key:'propietario',label:'Propietario'},{key:'categoria',label:'Categoría',type:'select',options:RUBROS_T},{key:'ciudad',label:'Ciudad',type:'select',options:CITIES},{key:'telefono',label:'Teléfono'},{key:'email',label:'Email'},{key:'plan',label:'Plan',type:'select',options:PLANS},{key:'estado',label:'Estado',type:'select',options:ESTADOS},{key:'fechaAlta',label:'Fecha Alta',type:'date'},{key:'fechaVencimiento',label:'Fecha Vencimiento',type:'date'}]});
      case 'comercios':return E(GenMod,{dataKey:'comercios',data:data.comercios,onSave:handleSave,onDelete:handleDelete,exportName:'comercios',addLabel:'Nuevo Comercio',filterFields:[{key:'estado',label:'Estado',options:ESTADOS},{key:'rubro',label:'Rubro',options:RUBROS_C},{key:'ciudad',label:'Ciudad',options:CITIES}],fields:[{key:'nombre',label:'Nombre Comercial'},{key:'rubro',label:'Rubro',type:'select',options:RUBROS_C},{key:'responsable',label:'Responsable'},{key:'ciudad',label:'Ciudad',type:'select',options:CITIES},{key:'whatsapp',label:'WhatsApp'},{key:'email',label:'Email'},{key:'plan',label:'Plan',type:'select',options:PLANS},{key:'estado',label:'Estado',type:'select',options:ESTADOS},{key:'fechaAlta',label:'Fecha Alta',type:'date'},{key:'fechaVencimiento',label:'Fecha Vencimiento',type:'date'}]});
      case 'riders':return E(GenMod,{dataKey:'riders',data:data.riders,onSave:handleSave,onDelete:handleDelete,exportName:'riders',addLabel:'Nuevo Rider',filterFields:[{key:'estado',label:'Estado',options:['Activo','Pendiente','Suspendido']},{key:'ciudad',label:'Ciudad',options:CITIES},{key:'vehiculo',label:'Vehículo',options:VEHICULOS}],fields:[{key:'nombre',label:'Nombre'},{key:'ciudad',label:'Ciudad',type:'select',options:CITIES},{key:'telefono',label:'Teléfono'},{key:'vehiculo',label:'Vehículo',type:'select',options:VEHICULOS},{key:'estado',label:'Estado',type:'select',options:['Activo','Pendiente','Suspendido']}]});
      case 'embajadores':return E(EmbModule,{data:data.embajadores,allData:data,onSave:handleSave,onDelete:handleDelete});
      case 'buscador':return E(BuscadorModule,{data});
      case 'actividad':return E(ActividadModule,{data});
      case 'configuracion':return E(ConfigModule,{user});
      default:return E('div',null,'Modulo en construccion');
    }
  }

  const pageTitle=NAV.find(n=>n.id===page)?.label||'Dashboard';

  return E('div',{className:'app'},
    E('div',{className:'mov'+(sbOpen?' show':''),onClick:()=>setSbOpen(false)}),
    E('div',{className:'sb'+(sbOpen?' open':'')},
      E('div',{className:'sblogo'},E('div',{className:'sbli'},E('div',{className:'sblic'},E('svg',{viewBox:'0 0 24 24',fill:'white',width:20,height:20},E('path',{d:'M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'}))),E('div',null,E('div',{className:'sblt'},'CRM ',E('span',null,'Alma')),E('div',{className:'sblts'},'Orders · '+user.role)))),
      E('nav',{className:'sbnav'},sections.map(sec=>{
        const items=NAV.filter(n=>n.sec===sec);
        return E(React.Fragment,{key:sec},
          E('div',{className:'nvsec'},sec),
          items.map(n=>E('div',{key:n.id,className:'nvi'+(page===n.id?' on':''),onClick:()=>{setPage(n.id);setSbOpen(false);}},
            E(Ico,{name:n.ic,size:17}),n.label,
            n.id==='notificaciones'&&totalN>0&&E('span',{className:'nvbadge'},totalN)
          ))
        );
      })),
      E('div',{className:'sbu'},E('div',{className:'av'},user.ini),E('div',{className:'ui'},E('div',{className:'un'},user.name),E('div',{className:'ur'},user.role)),E('div',{className:'lo',onClick:()=>setUser(null),title:'Salir'},E(Ico,{name:'logout',size:16})))
    ),
    E('div',{className:'main'},
      E('div',{className:'tb'},
        E('button',{className:'ib mbtn',onClick:()=>setSbOpen(!sbOpen)},E(Ico,{name:'menu',size:18})),
        E('div',{className:'tbt'},pageTitle),
        dbStatus==='loading'&&E('div',{style:{fontSize:11,color:G,fontWeight:600,display:'flex',alignItems:'center',gap:6,whiteSpace:'nowrap'}},
          E('div',{style:{width:7,height:7,borderRadius:'50%',background:G}}),
          'Cargando BD...'
        ),
        dbStatus==='ok'&&E('div',{style:{fontSize:11,color:'#10b981',fontWeight:600,whiteSpace:'nowrap'}},'● BD conectada'),
        dbStatus==='error'&&E('div',{style:{fontSize:11,color:'#f59e0b',fontWeight:600,whiteSpace:'nowrap'}},'⚠ Modo demo'),
        E(GlobalSearch,{data}),
        E('div',{className:'tba'},
          E('div',{style:{position:'relative'},ref:npRef},
            E('button',{className:'ib',onClick:()=>setNpOpen(!npOpen)},E(Ico,{name:'bell',size:16}),totalN>0&&E('div',{className:'ndot'})),
            npOpen&&E('div',{className:'np'},
              E('div',{className:'nph'},'Notificaciones',E('span',{style:{fontSize:11,color:'#9ca3af'}},totalN+' alertas')),
              data.prospectos.filter(p=>p.estado==='Nuevo').slice(0,4).map(p=>E('div',{key:p.id,className:'npi'},E('div',{className:'npd',style:{background:G}}),E('div',null,E('div',{className:'npt'},'Nuevo: '+p.nombre+' '+p.apellido),E('div',{className:'nptime'},p.rubro)))),
              data.profesionales.filter(p=>{const d=diffD(now,p.fechaVencimiento);return d>=0&&d<=30;}).slice(0,4).map(p=>E('div',{key:p.id,className:'npi'},E('div',{className:'npd',style:{background:'#f59e0b'}}),E('div',null,E('div',{className:'npt'},'Vence pronto: '+p.nombre+' '+p.apellido),E('div',{className:'nptime'},fmt(p.fechaVencimiento)))))
            )
          ),
          E('div',{className:'av',style:{width:32,height:32,fontSize:13,cursor:'pointer'}},user.ini)
        )
      ),
      E('div',{className:'cnt'},renderPage())
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(E(App));
</script>
</body>
</html>
